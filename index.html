<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jumping Ball</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f4a 0%, #1b4f72 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border-radius: 32px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            background: #7ec8e0;
        }

        /* Score panel */
        .score-panel {
            position: absolute;
            top: 18px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            pointer-events: none;
            z-index: 20;
        }

        .score-card, .highscore-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 8px 20px;
            color: white;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 1px;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .score-card span, .highscore-card span {
            color: #f9e75c;
            font-size: 26px;
            margin-right: 6px;
        }

        .highscore-card span:first-child {
            color: #ffaa44;
        }

        /* Hidden high score on first load */
        .hide-highscore {
            display: none;
        }

        /* start screen */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(25, 85, 120, 0.95), rgba(8, 35, 55, 0.98));
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            border-radius: 32px;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
        }

        .game-title {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF9C4, #FFE57F, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            letter-spacing: 4px;
            animation: float 2s ease-in-out infinite;
        }

        .sub {
            font-size: 1.1rem;
            color: #d4edff;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.4);
            padding: 6px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .highscore-start {
            font-size: 1.3rem;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 40px;
            margin: 15px 0;
            color: #ffd966;
            font-weight: bold;
        }

        .highscore-start span {
            color: white;
            margin-right: 8px;
        }

        .ball-preview {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            box-shadow: 0 0 0 4px gold, 0 15px 25px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .ball-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .start-btn {
            background: #f3a712;
            border: none;
            padding: 14px 44px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1e2f3a;
            border-radius: 60px;
            margin-top: 30px;
            box-shadow: 0 10px 0 #a05e15;
            transition: 0.07s linear;
            font-family: inherit;
            cursor: pointer;
            touch-action: manipulation;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 5px 0 #a05e15;
        }

        .info-tip {
            position: absolute;
            bottom: 18px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 30px;
            color: #eee;
            pointer-events: none;
            z-index: 20;
            font-weight: 500;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .hide {
            display: none;
        }

        @media (max-width: 650px) {
            .game-title { font-size: 2.8rem; }
            .start-btn { font-size: 1.4rem; padding: 12px 32px; }
            .score-card, .highscore-card { padding: 5px 16px; font-size: 18px; }
            .score-card span, .highscore-card span { font-size: 22px; }
            .highscore-start { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="score-panel">
        <div class="score-card">
            <span>⚡</span> <span id="scoreValue">0</span>
        </div>
        <div id="highScoreCard" class="highscore-card hide-highscore">
            <span>🏆</span> <span id="highScoreValue">0</span>
        </div>
    </div>
    <div class="info-tip">
        👆 Tap anywhere → jump & fly
    </div>

    <div id="startOverlay" class="start-screen">
        <div class="game-title">JUMPING BALL</div>
        <div class="sub">Develop by Sifat</div>
        <div id="startHighScoreContainer" class="highscore-start hide-highscore">
            <span>🏆 HIGH SCORE</span> <span id="startHighScore">0</span>
        </div>
        <div class="ball-preview">
            <img id="previewBallImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23FFD966' stroke='%23444444' stroke-width='2'/%3E%3Cpath d='M30,30 L70,70 M70,30 L30,70' stroke='%23333' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23AA7A3C'/%3E%3Cpath d='M20,50 L80,50 M50,20 L50,80' stroke='%23444444' stroke-width='2' stroke-dasharray='4 4'/%3E%3C/svg%3E" alt="jumping ball">
        </div>
        <button class="start-btn" id="startGameBtn">▶ PLAY</button>
        <div style="margin-top: 25px; font-size: 0.85rem; color:#b8e1fc;">tap screen • avoid pillars</div>
    </div>
</div>

<script>
    (function() {
        // ----- CANVAS SETUP -----
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreSpan = document.getElementById("scoreValue");
        const highScoreSpan = document.getElementById("highScoreValue");
        const startHighScoreSpan = document.getElementById("startHighScore");
        const startOverlay = document.getElementById("startOverlay");
        const startBtn = document.getElementById("startGameBtn");
        const highScoreCard = document.getElementById("highScoreCard");
        const startHighScoreContainer = document.getElementById("startHighScoreContainer");

        const CANVAS_W = 400;
        const CANVAS_H = 600;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        canvas.style.width = '100%';
        canvas.style.height = 'auto';
        canvas.style.aspectRatio = '400 / 600';

        let gameActive = false;
        let score = 0;
        let ballY = CANVAS_H / 2;
        let velocity = 0;
        const GRAVITY = 0.5;
        const JUMP_FORCE = -6.2;
        
        // Rotation variables
        let ballAngle = 0;
        let spinSpeed = 0.05;

        // Obstacle
        let pipeX = CANVAS_W;
        const PIPE_WIDTH = 42;
        const PIPE_GAP = 150; 
        let pipeTopHeight = Math.random() * (CANVAS_H - PIPE_GAP - 40) + 30; 

        const BALL_RADIUS = 16;
        let animationId = null;

        // ----- HIGH SCORE SYSTEM -----
        let highScore = 0;
        let hasPlayedBefore = false;  // Did we ever save a high score?

        function loadHighScore() {
            const saved = localStorage.getItem("jumpingBallHighScore");
            if (saved !== null && !isNaN(parseInt(saved))) {
                highScore = parseInt(saved);
                hasPlayedBefore = true;
                // Show high score UI since we have a record
                highScoreCard.classList.remove("hide-highscore");
                startHighScoreContainer.classList.remove("hide-highscore");
                updateHighScoreUI();
            } else {
                // First time visitor: keep high score UI hidden
                highScore = 0;
                hasPlayedBefore = false;
                highScoreCard.classList.add("hide-highscore");
                startHighScoreContainer.classList.add("hide-highscore");
            }
        }

        function updateHighScoreUI() {
            highScoreSpan.innerText = highScore;
            if (startHighScoreSpan) startHighScoreSpan.innerText = highScore;
        }

        function saveHighScoreIfNeeded(currentScore) {
            if (currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem("jumpingBallHighScore", highScore);
                updateHighScoreUI();
                // Ensure UI is visible now (in case it was hidden before first game)
                if (!hasPlayedBefore) {
                    hasPlayedBefore = true;
                    highScoreCard.classList.remove("hide-highscore");
                    startHighScoreContainer.classList.remove("hide-highscore");
                }
            } else if (!hasPlayedBefore && currentScore >= 0) {
                // First game ever, even if score 0 or low: show the high score interface
                // But don't save a zero if it's lower than existing? Actually no existing, so set highScore to currentScore.
                // However highScore is 0 from init, but we want to show the UI.
                // We'll just mark as played and reveal UI. HighScore remains 0 (or whatever currentScore if >0).
                if (currentScore > highScore) {
                    highScore = currentScore;
                    localStorage.setItem("jumpingBallHighScore", highScore);
                } else {
                    // first game but score 0, still we want to show "High Score: 0"
                    // ensure storage is set to 0 so next load sees it
                    localStorage.setItem("jumpingBallHighScore", highScore);
                }
                hasPlayedBefore = true;
                updateHighScoreUI();
                highScoreCard.classList.remove("hide-highscore");
                startHighScoreContainer.classList.remove("hide-highscore");
            }
        }

        // ----- CUSTOM BALL IMAGE -----
        function createCustomBallImage() {
            const size = 48; 
            const offCanvas = document.createElement('canvas');
            offCanvas.width = size;
            offCanvas.height = size;
            const offCtx = offCanvas.getContext('2d');
            const center = size/2;
            const radius = size/2 - 2;
            const grad = offCtx.createRadialGradient(center-5, center-5, 5, center, center, radius);
            grad.addColorStop(0, '#FFE27A');
            grad.addColorStop(0.6, '#E4B138');
            grad.addColorStop(1, '#B6771A');
            offCtx.beginPath();
            offCtx.arc(center, center, radius, 0, Math.PI*2);
            offCtx.fillStyle = grad;
            offCtx.fill();
            offCtx.strokeStyle = '#3C280D';
            offCtx.lineWidth = 1.8;
            offCtx.stroke();
            offCtx.beginPath();
            offCtx.lineWidth = 2.2;
            offCtx.strokeStyle = '#2F2A24';
            offCtx.moveTo(center - radius*0.7, center - radius*0.7);
            offCtx.lineTo(center + radius*0.7, center + radius*0.7);
            offCtx.moveTo(center + radius*0.7, center - radius*0.7);
            offCtx.lineTo(center - radius*0.7, center + radius*0.7);
            offCtx.stroke();
            offCtx.beginPath();
            offCtx.arc(center, center, radius*0.38, 0, Math.PI*2);
            offCtx.fillStyle = '#D49C2C';
            offCtx.fill();
            offCtx.fillStyle = '#9C6E1A';
            offCtx.beginPath();
            offCtx.arc(center-2, center-2, radius*0.15, 0, Math.PI*2);
            offCtx.fill();
            offCtx.fillStyle = '#F2D26B';
            offCtx.beginPath();
            offCtx.arc(center+3, center+2, radius*0.12, 0, Math.PI*2);
            offCtx.fill();
            offCtx.beginPath();
            offCtx.ellipse(center-6, center-8, 6, 4, 0, 0, Math.PI*2);
            offCtx.fillStyle = 'rgba(255,255,240,0.6)';
            offCtx.fill();
            offCtx.fillStyle = '#FFEEAA';
            offCtx.beginPath();
            offCtx.moveTo(center+12, center-10);
            offCtx.lineTo(center+15, center-14);
            offCtx.lineTo(center+18, center-10);
            offCtx.fill();
            const img = new Image();
            img.src = offCanvas.toDataURL();
            return img;
        }

        const ballImage = createCustomBallImage();

        const previewImg = document.getElementById("previewBallImg");
        if (previewImg) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 80;
            tempCanvas.height = 80;
            const tCtx = tempCanvas.getContext('2d');
            const rad = 38;
            tCtx.beginPath();
            tCtx.arc(40,40,rad,0,Math.PI*2);
            tCtx.fillStyle = '#F0B34B';
            tCtx.fill();
            tCtx.strokeStyle = '#4a3a1a';
            tCtx.lineWidth = 2;
            tCtx.stroke();
            tCtx.beginPath();
            tCtx.moveTo(15,15);
            tCtx.lineTo(65,65);
            tCtx.moveTo(65,15);
            tCtx.lineTo(15,65);
            tCtx.stroke();
            tCtx.beginPath();
            tCtx.arc(40,40,14,0,Math.PI*2);
            tCtx.fillStyle = '#c9871e';
            tCtx.fill();
            tCtx.fillStyle = '#FFD966';
            tCtx.beginPath();
            tCtx.arc(33,30,8,0,Math.PI*2);
            tCtx.fill();
            previewImg.src = tempCanvas.toDataURL();
        }

        // ----- helpers ----
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }

        function checkCollision() {
            if (ballY + BALL_RADIUS >= CANVAS_H || ballY - BALL_RADIUS <= 0) return true;
            const ballLeft = 50 - BALL_RADIUS;
            const ballRight = 50 + BALL_RADIUS;
            const ballTop = ballY - BALL_RADIUS;
            const ballBottom = ballY + BALL_RADIUS;
            const pipeLeft = pipeX;
            const pipeRight = pipeX + PIPE_WIDTH;
            if (ballRight > pipeLeft && ballLeft < pipeRight) {
                if (ballTop < pipeTopHeight) return true;
                if (ballBottom > pipeTopHeight + PIPE_GAP) return true;
            }
            return false;
        }

        function endGame() {
            if (!gameActive) return;
            gameActive = false;
            if (animationId) cancelAnimationFrame(animationId);
            // Save high score (this will also reveal UI if first time)
            saveHighScoreIfNeeded(score);
            alert(`⚡ GAME OVER ⚡\nYour score: ${score}\nBest: ${highScore}\nTap OK to play again!`);
            showStartScreenAndReset();
        }

        function showStartScreenAndReset() {
            gameActive = false;
            startOverlay.classList.remove("hide");
            score = 0;
            updateScoreUI();
            ballY = CANVAS_H / 2;
            velocity = 0;
            ballAngle = 0;
            spinSpeed = 0.05;
            pipeX = CANVAS_W;
            pipeTopHeight = Math.random() * (CANVAS_H - PIPE_GAP - 60) + 40;
            if (pipeTopHeight < 25) pipeTopHeight = 35;
            if (pipeTopHeight + PIPE_GAP > CANVAS_H - 25) pipeTopHeight = CANVAS_H - PIPE_GAP - 35;
            drawStaticPreview();
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
        }

        function drawStaticPreview() {
            if (!ctx) return;
            drawSkyAndBackground();
            drawPillars();
            drawBall();
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.font = "bold 24px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.fillText("READY?", CANVAS_W/2, 120);
        }

        function drawSkyAndBackground() {
            const gradSky = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
            gradSky.addColorStop(0, '#6EC8E0');
            gradSky.addColorStop(0.5, '#43B3D1');
            gradSky.addColorStop(1, '#FFCF9A');
            ctx.fillStyle = gradSky;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = 'rgba(255,255,245,0.85)';
            ctx.beginPath();
            ctx.ellipse(70, 80, 40, 30, 0, 0, Math.PI*2);
            ctx.ellipse(110, 70, 45, 32, 0, 0, Math.PI*2);
            ctx.ellipse(140, 85, 35, 28, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(290, 140, 45, 32, 0, 0, Math.PI*2);
            ctx.ellipse(330, 130, 40, 30, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,240,210,0.7)';
            ctx.beginPath();
            ctx.ellipse(180, 480, 60, 35, 0, 0, Math.PI*2);
            ctx.fill();
        }

        function drawPillars() {
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#E3CFA5";
            ctx.fillRect(pipeX, 0, PIPE_WIDTH, pipeTopHeight);
            ctx.fillStyle = "#C2A575";
            ctx.fillRect(pipeX, pipeTopHeight-20, PIPE_WIDTH, 20);
            ctx.fillStyle = "#E3CFA5";
            ctx.fillRect(pipeX, pipeTopHeight + PIPE_GAP, PIPE_WIDTH, CANVAS_H);
            ctx.fillStyle = "#C2A575";
            ctx.fillRect(pipeX, pipeTopHeight + PIPE_GAP, PIPE_WIDTH, 18);
            ctx.fillStyle = "#A58254";
            for(let i=0;i<3;i++) {
                ctx.fillRect(pipeX+5, pipeTopHeight-15 + i*6, PIPE_WIDTH-10, 3);
                ctx.fillRect(pipeX+5, pipeTopHeight + PIPE_GAP + 6 + i*6, PIPE_WIDTH-10, 3);
            }
        }

        function drawBall() {
            ctx.save();
            ctx.translate(50, ballY);
            ctx.rotate(ballAngle);
            if (ballImage.complete && ballImage.naturalWidth > 0) {
                ctx.drawImage(ballImage, -BALL_RADIUS, -BALL_RADIUS, BALL_RADIUS*2, BALL_RADIUS*2);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, BALL_RADIUS, 0, Math.PI*2);
                ctx.fillStyle = "#FFB347";
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.font = "bold 20px sans-serif";
                ctx.fillText("⚽", -10, 7);
            }
            ctx.restore();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.arc(50, ballY, BALL_RADIUS-2, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,230,140,0.2)";
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function updateGame() {
            if (!gameActive) return;
            velocity += GRAVITY;
            ballY += velocity;
            ballAngle += spinSpeed;
            if (spinSpeed > 0.05) spinSpeed -= 0.01;
            pipeX -= 2.2;
            if (pipeX + PIPE_WIDTH < 0) {
                pipeX = CANVAS_W;
                let newTop = Math.random() * (CANVAS_H - PIPE_GAP - 50) + 35;
                if (newTop < 20) newTop = 25;
                if (newTop + PIPE_GAP > CANVAS_H - 20) newTop = CANVAS_H - PIPE_GAP - 30;
                pipeTopHeight = newTop;
                score++;
                updateScoreUI();
            }
            if (checkCollision()) {
                endGame();
                return;
            }
            if (ballY + BALL_RADIUS > CANVAS_H || ballY - BALL_RADIUS < 0) {
                endGame();
                return;
            }
        }

        function drawGame() {
            if (!ctx) return;
            drawSkyAndBackground();
            drawPillars();
            drawBall();
            ctx.fillStyle = "#4C9F3C";
            ctx.fillRect(0, CANVAS_H-12, CANVAS_W, 12);
            ctx.fillStyle = "#76C45A";
            for(let i=0;i<12;i++) {
                ctx.fillRect(i*35, CANVAS_H-15, 3, 8);
            }
        }

        function handleJump(e) {
            e.preventDefault();
            if (!gameActive) return;
            velocity = JUMP_FORCE;
            spinSpeed = 0.45;
        }

        function gameLoop() {
            if (gameActive) {
                updateGame();
                drawGame();
            } else {
                if (startOverlay.classList.contains('hide')) {
                    drawGame();
                } else {
                    drawStaticPreview();
                }
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            startOverlay.classList.add("hide");
            gameActive = true;
            score = 0;
            updateScoreUI();
            ballY = CANVAS_H / 2;
            velocity = 0;
            ballAngle = 0;
            spinSpeed = 0.05;
            pipeX = CANVAS_W;
            pipeTopHeight = Math.random() * (CANVAS_H - PIPE_GAP - 60) + 40;
            if (pipeTopHeight < 30) pipeTopHeight = 35;
            if (pipeTopHeight + PIPE_GAP > CANVAS_H - 30) pipeTopHeight = CANVAS_H - PIPE_GAP - 40;
        }
        
        function bindEvents() {
            canvas.addEventListener("touchstart", (e) => {
                e.preventDefault();
                handleJump(e);
            });
            canvas.addEventListener("mousedown", (e) => {
                e.preventDefault();
                handleJump(e);
            });
            startBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                startGame();
            });
        }
        
        function init() {
            loadHighScore();  // Load saved high score from localStorage, UI hidden if first time
            bindEvents();
            ballImage.onload = () => {
                if (!gameActive && startOverlay && !startOverlay.classList.contains('hide')) {
                    drawStaticPreview();
                }
            };
            drawStaticPreview();
            gameLoop();   
        }
        
        startBtn.onclick = (e) => {
            e.preventDefault();
            startGame();
        };
        
        init();
    })();
</script>
</body>
</html>
