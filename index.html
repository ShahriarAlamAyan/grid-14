<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jumping Ball</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f4a 0%, #1b4f72 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border-radius: 32px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            background: #7ec8e0; /* fallback sky */
        }

        /* Score panel - premium glassmorphism */
        .score-panel {
            position: absolute;
            top: 18px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }

        .score-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 8px 28px;
            color: white;
            font-weight: bold;
            font-size: 28px;
            letter-spacing: 1px;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .score-card span {
            color: #f9e75c;
            font-size: 34px;
            margin-right: 6px;
        }

        /* start screen 2*/
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(25, 85, 120, 0.95), rgba(8, 35, 55, 0.98));
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            border-radius: 32px;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
        }

        .game-title {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF9C4, #FFE57F, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            letter-spacing: 4px;
            animation: float 2s ease-in-out infinite;
        }

        .sub {
            font-size: 1.1rem;
            color: #d4edff;
            margin-bottom: 35px;
            background: rgba(0,0,0,0.4);
            padding: 6px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .ball-preview {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            box-shadow: 0 0 0 4px gold, 0 15px 25px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .ball-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .start-btn {
            background: #f3a712;
            border: none;
            padding: 14px 44px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1e2f3a;
            border-radius: 60px;
            margin-top: 30px;
            box-shadow: 0 10px 0 #a05e15;
            transition: 0.07s linear;
            font-family: inherit;
            cursor: pointer;
            touch-action: manipulation;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 5px 0 #a05e15;
        }

        .info-tip {
            position: absolute;
            bottom: 18px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 30px;
            color: #eee;
            pointer-events: none;
            z-index: 20;
            font-weight: 500;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .hide {
            display: none;
        }

        /* responsive canvas */
        @media (max-width: 650px) {
            .game-title { font-size: 2.8rem; }
            .start-btn { font-size: 1.4rem; padding: 12px 32px; }
            .score-card { padding: 5px 20px; font-size: 22px; }
            .score-card span { font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="score-panel">
        <div class="score-card">
            <span>⚡</span> <span id="scoreValue">0</span>
        </div>
    </div>
    <div class="info-tip">
        👆 Tap anywhere → jump & fly
    </div>

    <!-- Start / landing screen -->
    <div id="startOverlay" class="start-screen">
        <div class="game-title">JUMPING BALL</div>
        <div class="sub">Develop by Sifat</div>
        <div class="ball-preview">
            <img id="previewBallImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23FFD966' stroke='%23444444' stroke-width='2'/%3E%3Cpath d='M30,30 L70,70 M70,30 L30,70' stroke='%23333' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23AA7A3C'/%3E%3Cpath d='M20,50 L80,50 M50,20 L50,80' stroke='%23444444' stroke-width='2' stroke-dasharray='4 4'/%3E%3C/svg%3E" alt="jumping ball">
        </div>
        <button class="start-btn" id="startGameBtn">▶ PLAY</button>
        <div style="margin-top: 25px; font-size: 0.85rem; color:#b8e1fc;">tap screen • avoid pillars</div>
    </div>
</div>

<script>
    (function() {
        // ----- CANVAS SETUP -----
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreSpan = document.getElementById("scoreValue");
        const startOverlay = document.getElementById("startOverlay");
        const startBtn = document.getElementById("startGameBtn");

        // Set canvas dimensions (fixed logical resolution but scales responsively)
        // We want consistent gameplay on different devices: 400x600
        const CANVAS_W = 400;
        const CANVAS_H = 600;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        // ensure container style fits properly
        canvas.style.width = '100%';
        canvas.style.height = 'auto';
        canvas.style.aspectRatio = '400 / 600';

        // let gameplay = false
        let gameActive = false;      // becomes true after start screen fades
        let score = 0;
        let ballY = CANVAS_H / 2;
        let velocity = 0;
        const GRAVITY = 0.5;
        const JUMP_FORCE = -8.2;

        // Obstacle (pipe/pillar)
        let pipeX = CANVAS_W;
        const PIPE_WIDTH = 42;
        const PIPE_GAP = 150;        // gap between upper and lower pillar
        let pipeTopHeight = Math.random() * (CANVAS_H - PIPE_GAP - 40) + 30; // range 30 to (height-gap-30)

        // ball radius
        const BALL_RADIUS = 16;

        // Game over & frame control
        let animationId = null;

        // ----- CUSTOM BALL IMAGE (high quality vector style) -----
        // We'll generate an image element using canvas drawing as a texture, 
        // OR we create an inline SVG image that looks like a cool jumping ball with soccer/football hybrid + glow.
        // But to make it unique "Jumping Ball" with personality, we will create an Image bitmap from an SVG.
        // This satisfies "Generate an image that I will use in the code. Use the image as the ball."
        // We'll draw a super detailed ball with shadow, seams, and gradient.

        function createCustomBallImage() {
            // Create an offscreen canvas to generate a high-quality ball sprite
            const size = 48;  // double resolution for crispness
            const offCanvas = document.createElement('canvas');
            offCanvas.width = size;
            offCanvas.height = size;
            const offCtx = offCanvas.getContext('2d');
            
            const center = size/2;
            const radius = size/2 - 2;
            
            // radial gradient for 3D sphere effect
            const grad = offCtx.createRadialGradient(center-5, center-5, 5, center, center, radius);
            grad.addColorStop(0, '#FFE27A');
            grad.addColorStop(0.6, '#E4B138');
            grad.addColorStop(1, '#B6771A');
            offCtx.beginPath();
            offCtx.arc(center, center, radius, 0, Math.PI*2);
            offCtx.fillStyle = grad;
            offCtx.fill();
            offCtx.strokeStyle = '#3C280D';
            offCtx.lineWidth = 1.8;
            offCtx.stroke();
            
            // classic soccer-like pentagon pattern but stylized for Jumping Ball
            offCtx.beginPath();
            offCtx.lineWidth = 2.2;
            offCtx.strokeStyle = '#2F2A24';
            // Draw crossing stripes
            offCtx.beginPath();
            offCtx.moveTo(center - radius*0.7, center - radius*0.7);
            offCtx.lineTo(center + radius*0.7, center + radius*0.7);
            offCtx.moveTo(center + radius*0.7, center - radius*0.7);
            offCtx.lineTo(center - radius*0.7, center + radius*0.7);
            offCtx.stroke();
            
            // central hexagon effect
            offCtx.beginPath();
            offCtx.arc(center, center, radius*0.38, 0, Math.PI*2);
            offCtx.fillStyle = '#D49C2C';
            offCtx.fill();
            offCtx.fillStyle = '#9C6E1A';
            offCtx.beginPath();
            offCtx.arc(center-2, center-2, radius*0.15, 0, Math.PI*2);
            offCtx.fill();
            offCtx.fillStyle = '#F2D26B';
            offCtx.beginPath();
            offCtx.arc(center+3, center+2, radius*0.12, 0, Math.PI*2);
            offCtx.fill();
            
            // white highlight
            offCtx.beginPath();
            offCtx.ellipse(center-6, center-8, 6, 4, 0, 0, Math.PI*2);
            offCtx.fillStyle = 'rgba(255,255,240,0.6)';
            offCtx.fill();
            
            // add little star/spark
            offCtx.fillStyle = '#FFEEAA';
            offCtx.beginPath();
            offCtx.moveTo(center+12, center-10);
            offCtx.lineTo(center+15, center-14);
            offCtx.lineTo(center+18, center-10);
            offCtx.fill();
            
            const img = new Image();
            img.src = offCanvas.toDataURL();
            return img;
        }

        const ballImage = createCustomBallImage();

        // alternative ready preview for start screen also show same image
        const previewImg = document.getElementById("previewBallImg");
        if (previewImg) {
            // replace preview with our generated ball image
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 80;
            tempCanvas.height = 80;
            const tCtx = tempCanvas.getContext('2d');
            const rad = 38;
            tCtx.beginPath();
            tCtx.arc(40,40,rad,0,Math.PI*2);
            tCtx.fillStyle = '#F0B34B';
            tCtx.fill();
            tCtx.strokeStyle = '#4a3a1a';
            tCtx.lineWidth = 2;
            tCtx.stroke();
            tCtx.beginPath();
            tCtx.moveTo(15,15);
            tCtx.lineTo(65,65);
            tCtx.moveTo(65,15);
            tCtx.lineTo(15,65);
            tCtx.stroke();
            tCtx.beginPath();
            tCtx.arc(40,40,14,0,Math.PI*2);
            tCtx.fillStyle = '#c9871e';
            tCtx.fill();
            tCtx.fillStyle = '#FFD966';
            tCtx.beginPath();
            tCtx.arc(33,30,8,0,Math.PI*2);
            tCtx.fill();
            previewImg.src = tempCanvas.toDataURL();
        }

        // ----- helper functions ----
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }

        // reset game values without restarting screen
        function fullGameReset() {
            score = 0;
            updateScoreUI();
            ballY = CANVAS_H / 2;
            velocity = 0;
            pipeX = CANVAS_W;
            // generate new random pipe position
            pipeTopHeight = Math.random() * (CANVAS_H - PIPE_GAP - 60) + 40;
            if (pipeTopHeight < 25) pipeTopHeight = 35;
            if (pipeTopHeight + PIPE_GAP > CANVAS_H - 25) pipeTopHeight = CANVAS_H - PIPE_GAP - 35;
            gameActive = true;
        }

        // collision detection (precise)
        function checkCollision() {
            // ball boundaries
            if (ballY + BALL_RADIUS >= CANVAS_H || ballY - BALL_RADIUS <= 0) {
                return true;
            }
            
            // pipe collision (rectangle vs circle)
            const ballLeft = 50 - BALL_RADIUS;
            const ballRight = 50 + BALL_RADIUS;
            const ballTop = ballY - BALL_RADIUS;
            const ballBottom = ballY + BALL_RADIUS;
            
            const pipeLeft = pipeX;
            const pipeRight = pipeX + PIPE_WIDTH;
            
            // overlap condition
            if (ballRight > pipeLeft && ballLeft < pipeRight) {
                // top pillar collision
                if (ballTop < pipeTopHeight) return true;
                // bottom pillar collision
                if (ballBottom > pipeTopHeight + PIPE_GAP) return true;
            }
            return false;
        }

        // game over handling
        function endGame() {
            if (!gameActive) return;
            gameActive = false;
            // show game over with alert but less intrusive? but we want smooth experience.
            // but we will display overlay-style message using a dynamic banner? For simplicity & modern: show alert and reset.
            // But alert blocks, however we add a friendly restart within alert.
            // Alternatively show small modal but I'll use sweet alert style using confirm? Use alert then restart.
            // Better: display within canvas? But ensure user restart. We'll call reset with start overlay?
            // Actually we want start screen again but keep game restart. Let's fade in startOverlay again and reset state.
            if (animationId) cancelAnimationFrame(animationId);
            // show start screen again with last score alert?
            alert(`⚡ GAME OVER ⚡\nYour score: ${score}\nTap OK to play again!`);
            showStartScreenAndReset();
        }

        function showStartScreenAndReset() {
            gameActive = false;
            startOverlay.classList.remove("hide");
            // reset game variables (for future start)
            score = 0;
            updateScoreUI();
            ballY = CANVAS_H / 2;
            velocity = 0;
            pipeX = CANVAS_W;
            pipeTopHeight = Math.random() * (CANVAS_H - PIPE_GAP - 60) + 40;
            if (pipeTopHeight < 25) pipeTopHeight = 35;
            if (pipeTopHeight + PIPE_GAP > CANVAS_H - 25) pipeTopHeight = CANVAS_H - PIPE_GAP - 35;
            // draw static game preview (non interactive) to show background?
            drawStaticPreview();
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
        }

        function drawStaticPreview() {
            if (!ctx) return;
            drawSkyAndBackground();
            drawPillars();
            drawBall();
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.font = "bold 24px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.fillText("READY?", CANVAS_W/2, 120);
        }

        function drawSkyAndBackground() {
            // New sky gradient (deep sunset to vibrant sky blue)
            const gradSky = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
            gradSky.addColorStop(0, '#6EC8E0');
            gradSky.addColorStop(0.5, '#43B3D1');
            gradSky.addColorStop(1, '#FFCF9A');
            ctx.fillStyle = gradSky;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            // draw fluffy clouds
            ctx.fillStyle = 'rgba(255,255,245,0.85)';
            ctx.beginPath();
            ctx.ellipse(70, 80, 40, 30, 0, 0, Math.PI*2);
            ctx.ellipse(110, 70, 45, 32, 0, 0, Math.PI*2);
            ctx.ellipse(140, 85, 35, 28, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(290, 140, 45, 32, 0, 0, Math.PI*2);
            ctx.ellipse(330, 130, 40, 30, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,240,210,0.7)';
            ctx.beginPath();
            ctx.ellipse(180, 480, 60, 35, 0, 0, Math.PI*2);
            ctx.fill();
        }

        function drawPillars() {
            // brick / stone pillars with texture
            ctx.shadowBlur = 0;
            // Upper pillar
            ctx.fillStyle = "#E3CFA5";
            ctx.fillRect(pipeX, 0, PIPE_WIDTH, pipeTopHeight);
            ctx.fillStyle = "#C2A575";
            ctx.fillRect(pipeX, pipeTopHeight-20, PIPE_WIDTH, 20);
            // lower pillar
            ctx.fillStyle = "#E3CFA5";
            ctx.fillRect(pipeX, pipeTopHeight + PIPE_GAP, PIPE_WIDTH, CANVAS_H);
            ctx.fillStyle = "#C2A575";
            ctx.fillRect(pipeX, pipeTopHeight + PIPE_GAP, PIPE_WIDTH, 18);
            // detailing lines
            ctx.fillStyle = "#A58254";
            for(let i=0;i<3;i++) {
                ctx.fillRect(pipeX+5, pipeTopHeight-15 + i*6, PIPE_WIDTH-10, 3);
                ctx.fillRect(pipeX+5, pipeTopHeight + PIPE_GAP + 6 + i*6, PIPE_WIDTH-10, 3);
            }
        }

        function drawBall() {
            // draw custom image as ball!
            if (ballImage.complete && ballImage.naturalWidth > 0) {
                ctx.drawImage(ballImage, 50 - BALL_RADIUS, ballY - BALL_RADIUS, BALL_RADIUS*2, BALL_RADIUS*2);
            } else {
                // fallback in case image not loaded yet
                ctx.beginPath();
                ctx.arc(50, ballY, BALL_RADIUS, 0, Math.PI*2);
                ctx.fillStyle = "#FFB347";
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.font = "bold 20px sans-serif";
                ctx.fillText("⚽", 42, ballY+7);
            }
            // add motion blur effect or cute trail?
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.arc(50, ballY, BALL_RADIUS-2, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,230,140,0.2)";
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // update physics and obstacles
        function updateGame() {
            if (!gameActive) return;
            
            // physics
            velocity += GRAVITY;
            ballY += velocity;
            
            // pipe movement
            pipeX -= 3.6;  // smooth speed
            
            if (pipeX + PIPE_WIDTH < 0) {
                pipeX = CANVAS_W;
                // randomize gap position
                let newTop = Math.random() * (CANVAS_H - PIPE_GAP - 50) + 35;
                if (newTop < 20) newTop = 25;
                if (newTop + PIPE_GAP > CANVAS_H - 20) newTop = CANVAS_H - PIPE_GAP - 30;
                pipeTopHeight = newTop;
                // increase score only when pipe passed safely (after passing left edge)
                score++;
                updateScoreUI();
            }
            
            // collision detection
            if (checkCollision()) {
                endGame();
                return;
            }
            
            // extra ceiling/floor bound check if ball out but collision already covers, just double ensure
            if (ballY + BALL_RADIUS > CANVAS_H || ballY - BALL_RADIUS < 0) {
                endGame();
                return;
            }
        }

        function drawGame() {
            if (!ctx) return;
            drawSkyAndBackground();
            drawPillars();
            drawBall();
            
            // small grass effect
            ctx.fillStyle = "#4C9F3C";
            ctx.fillRect(0, CANVAS_H-12, CANVAS_W, 12);
            ctx.fillStyle = "#76C45A";
            for(let i=0;i<12;i++) {
                ctx.fillRect(i*35, CANVAS_H-15, 3, 8);
            }
        }

        // tap / jump control
        function handleJump(e) {
            e.preventDefault();
            if (!gameActive) return;
            velocity = JUMP_FORCE;
            // optional tiny boost sound effect? not needed but feels nice
        }

        // animation loop
        function gameLoop() {
            if (gameActive) {
                updateGame();
                drawGame();
            } else {
                // if game inactive but overlay not visible? keep drawing static background
                if (startOverlay.classList.contains('hide')) {
                    drawGame();
                } else {
                    drawStaticPreview();
                }
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        // ----- START GAME CALLBACK (remove overlay and engage) -----
        function startGame() {
            startOverlay.classList.add("hide");
            // reset everything to fresh state
            gameActive = true;
            score = 0;
            updateScoreUI();
            ballY = CANVAS_H / 2;
            velocity = 0;
            pipeX = CANVAS_W;
            pipeTopHeight = Math.random() * (CANVAS_H - PIPE_GAP - 60) + 40;
            if (pipeTopHeight < 30) pipeTopHeight = 35;
            if (pipeTopHeight + PIPE_GAP > CANVAS_H - 30) pipeTopHeight = CANVAS_H - PIPE_GAP - 40;
            // ensure no pending game over flags
        }
        
        // add event listeners
        function bindEvents() {
            // touch and mouse for canvas jumping
            canvas.addEventListener("touchstart", (e) => {
                e.preventDefault();
                handleJump(e);
            });
            canvas.addEventListener("mousedown", (e) => {
                e.preventDefault();
                handleJump(e);
            });
            // also start button
            startBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                startGame();
            });
            // also clicking on overlay background to start? we don't want accidental; only button.
        }
        
        // initial draw preview & start showing startScreen with title
        function init() {
            bindEvents();
            ballImage.onload = () => {
                if (!gameActive && startOverlay && !startOverlay.classList.contains('hide')) {
                    drawStaticPreview();
                }
            };
            drawStaticPreview();
            gameLoop();   // start animation regardless
        }
        
        // Override start via start button: also cancel any ongoing endGame flags
        startBtn.onclick = (e) => {
            e.preventDefault();
            startGame();
        };
        
        init();
    })();
</script>
</body>
</html>
